name: Deploy to VPS

on:
  push:
    branches:
      - master  # hoặc branch bạn dùng để deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Deploy over SSH
      run: |
        ssh -o StrictHostKeyChecking=no root@139.59.228.247 << 'EOF'
          cd sypik
          git pull origin master
          docker compose down
          docker compose up -d --build
        EOF

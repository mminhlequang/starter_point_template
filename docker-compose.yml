services:

  # ================== DATABASE ==================
  db:
    image: postgres:17
    container_name: shopviaads-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .backend.env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
    networks:
      - app-network

  # ================== DATABASE ADMIN UI ==================
  adminer:
    image: adminer
    container_name: shopviaads-adminer
    restart: unless-stopped
    ports:
      - "8085:8080"
    depends_on:
      - db
    environment:
      - ADMINER_DESIGN=pepa-linha-dark
    networks:
      - app-network

  # ================== DATABASE MIGRATIONS ==================
  prestart:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopviaads-prestart
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .backend.env
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
    command: bash scripts/prestart.sh
    networks:
      - app-network

  # ================== BACKEND (FastAPI) ==================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopviaads-backend
    restart: unless-stopped
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
    env_file:
      - .backend.env
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - FIREBASE_SERVICE_ACCOUNT_FILE=/app/firebase-service-account.json
    command:
      - fastapi
      - run
      - "app/main.py"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 60s
      timeout: 5s
      retries: 5
    volumes:
      - app-public-data:/app/public
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json:ro
    networks:
      - app-network

  # ================== FRONTEND (Next.js) ==================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shopviaads-frontend
    restart: unless-stopped
    ports:
      - "0.0.0.0:3002:3000"
    depends_on:
      - backend
    env_file:
      - .frontend.env
    environment:
      - NODE_ENV=production 
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network

# ================== VOLUMES ==================
volumes:
  app-db-data:
    driver: local
  app-public-data:
    driver: local

# ================== NETWORKS ==================
networks:
  app-network:
    driver: bridge
